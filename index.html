<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портал user4a</title>
    <style>
        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .header {
            padding: 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.4);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        h1 { margin: 0; font-size: 1.2rem; color: #0d47a1; }
        .nav {
            display: flex;
            background: rgba(255, 255, 255, 0.5);
        }
        .tab {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            color: #555;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: #0d47a1;
            border-bottom: 2px solid #0d47a1;
            font-weight: bold;
        }
        .content { padding: 30px; text-align: left; min-height: 150px; }
        .box { animation: fadeIn 0.5s ease; }
        .hidden { display: none; }
        .btn-link {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 20px;
            background: #0d47a1;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 14px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Личный кабинет user4a</h1>
    </div>
    
    <div class="nav">
        <button class="tab active" id="btn-h" onclick="show('h')">Главная</button>
        <button class="tab" id="btn-c" onclick="show('c')">Создатели</button>
    </div>

    <div class="content">
        <div id="h" class="box">
            <h2 style="margin-top:0;">Добро Пожаловать</h2>
            <p style="color: #666; line-height: 1.5;">Вы успешно авторизованы на персональной странице пользователя user4a. Здесь вы найдете актуальную информацию по проекту.</p>
        </div>

        <div id="c" class="box hidden">
            <h2 style="margin-top:0;">Контакты</h2>
            <p>Свяжитесь с нами через официальные каналы:</p>
            <a href="https://www.tiktok.com/@usergogle4a?_r=1&_t=ZP-95i73y0ZHsV" target="_blank" class="btn-link">Перейти в TikTok</a>
        </div>
    </div>
</div>

<script>
    function show(id) {
        document.getElementById('h').classList.add('hidden');
        document.getElementById('c').classList.add('hidden');
        document.getElementById('btn-h').classList.remove('active');
        document.getElementById('btn-c').classList.remove('active');
        
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('btn-' + id).classList.add('active');
    }
</script>

</body>
</html>
