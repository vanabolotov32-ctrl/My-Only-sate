<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портал user4a</title>
    <style>
        body {
            background: url('Без названия25_20260421102234.png') no-repeat center center fixed;
            background-size: cover;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            animation: start 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes start {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .header {
            padding: 35px 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
        }
        .user-avatar {
            width: 90px;
            height: 90px;
            background: rgba(255,255,255,0.1) url('40829.png') no-repeat center center;
            background-size: cover;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 3px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        h1 { 
            margin: 0; 
            font-size: 1.1rem; 
            color: #fff; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { opacity: 0.8; text-shadow: 0 0 5px #fff; }
            to { opacity: 1; text-shadow: 0 0 20px #fff, 0 0 30px #448aff; }
        }
        .nav {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
        }
        .tab {
            flex: 1;
            padding: 18px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            transition: 0.4s;
            font-weight: 900;
            letter-spacing: 1px;
        }
        .tab.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 -3px 0 #fff;
        }
        .content { padding: 30px; color: #fff; min-height: 140px; }
        .box { animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
        h2 { font-size: 22px; margin-top: 0; font-weight: 300; }
        p { font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.85); }
        .btn-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            padding: 16px;
            background: #fff;
            color: #1a237e;
            text-decoration: none;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn-link:hover { background: #e8eaf6; transform: translateY(-2px); }
        .btn-link:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="user-avatar"></div>
        <h1>Portal user4a</h1>
    </div>
    
    <div class="nav">
        <button class="tab active" id="btn-h" onclick="show('h')">ИНФО</button>
        <button class="tab" id="btn-c" onclick="show('c')">TIKTOK</button>
    </div>

    <div class="content">
        <div id="h" class="box">
            <h2>Система активна</h2>
            <p>Добро Пожаловать на мой первый сайт! <br><br>Сайт пока что в тестировании, но скоро здесь появится много нового контента.</p>
        </div>

        <div id="c" class="box hidden">
            <h2>Видеохостинг</h2>
            <p>Следите за обновлениями моих глитч-проектов и мобильных симуляций:</p>
            <a href="https://www.tiktok.com/@usergogle4a?_r=1&_t=ZP-95i73y0ZHsV" target="_blank" class="btn-link">ОТКРЫТЬ ПРОФИЛЬ</a>
        </div>
    </div>
</div>

<script>
    function show(id) {
        document.getElementById('h').classList.add('hidden');
        document.getElementById('c').classList.add('hidden');
        document.getElementById('btn-h').classList.remove('active');
        document.getElementById('btn-c').classList.remove('active');
        
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('btn-' + id).classList.add('active');
    }
</script>

</body>
</html>
