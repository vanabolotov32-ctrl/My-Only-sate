<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портал user4a</title>
    <style>
        body {
            /* Используем твой рисунок как фон */
            background: url('Без названия25_20260421102234.png') no-repeat center center fixed;
            background-size: cover;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 450px;
            /* Усиленная прозрачность (стекло) */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: start 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes start {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .header {
            padding: 30px;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
        }
        /* Твоя нарисованная аватарка */
        .user-avatar {
            width: 80px;
            height: 80px;
            background: #fff url('40829.png') no-repeat center center;
            background-size: contain;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
        h1 { margin: 0; font-size: 1rem; color: #fff; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .nav {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
        }
        .tab {
            flex: 1;
            padding: 16px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            transition: 0.3s;
            font-weight: bold;
        }
        .tab.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border-bottom: 3px solid #fff;
        }
        .content { padding: 30px; color: #fff; min-height: 120px; }
        .box { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none; }
        h2 { font-size: 20px; margin-top: 0; }
        p { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.9); }
        .btn-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            padding: 16px;
            background: #fff;
            color: #1a237e;
            text-decoration: none;
            border-radius: 14px;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-link:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="user-avatar"></div>
        <h1>Portal user4a</h1>
    </div>
    
    <div class="nav">
        <button class="tab active" id="btn-h" onclick="show('h')">ИНФО</button>
        <button class="tab" id="btn-c" onclick="show('c')">TIKTOK</button>
    </div>

    <div class="content">
        <div id="h" class="box">
            <h2>Система активна</h2>
            <p>Добро пожаловать в персональный узел связи. Весь контент синхронизирован с основным каналом.</p>
        </div>

        <div id="c" class="box hidden">
            <h2>Видеохостинг</h2>
            <p>Последние обновления глитч-проектов и системных симуляций доступны по ссылке:</p>
            <a href="https://www.tiktok.com/@usergogle4a?_r=1&_t=ZP-95i73y0ZHsV" target="_blank" class="btn-link">ОТКРЫТЬ ПРОФИЛЬ</a>
        </div>
    </div>
</div>

<script>
    function show(id) {
        document.getElementById('h').classList.add('hidden');
        document.getElementById('c').classList.add('hidden');
        document.getElementById('btn-h').classList.remove('active');
        document.getElementById('btn-c').classList.remove('active');
        
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('btn-' + id).classList.add('active');
    }
</script>

</body>
</html>
